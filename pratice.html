<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flex Row Layout</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-size: xx-large;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        /* Container (row) */
        .container {
            display: flex;              /* main flex */
            flex-direction: row;        /* row layout */
            justify-content: space-around; /* spacing */
            align-items: center;        /* vertical center */
            gap: 20px;
            padding: 40px;
        }

        /* Each item */
        .item {
            background-color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            width: 200px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Image */
        .item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
        }

        /* Text */
        .item p {
            margin-top: 10px;
            font-size: 16px;
        }

    </style>
</head>

<body>

    <div class="container">

        <div class="item">
            <img src="https://images.unsplash.com/photo-1762088201192-b157e9adb2f1?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHx0b3BpYy1mZWVkfDd8eEh4WVRNSExnT2N8fGVufDB8fHx8fA%3D%3D" alt="Image 1">
            <p>Beautiful Image 1</p>
        </div>

        <div class="item">
            <img src="https://images.unsplash.com/photo-1762088201192-b157e9adb2f1?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHx0b3BpYy1mZWVkfDd8eEh4WVRNSExnT2N8fGVufDB8fHx8fA%3D%3D" alt="Image 2">
            <p>Beautiful Image 2</p>
        </div>

        <div class="item">
            <img src="https://images.unsplash.com/photo-1762088201192-b157e9adb2f1?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHx0b3BpYy1mZWVkfDd8eEh4WVRNSExnT2N8fGVufDB8fHx8fA%3D%3D" alt="Image 3">
            <p>Beautiful Image 3</p>
        </div>

    </div>

</body>
</html>
